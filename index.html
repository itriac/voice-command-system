<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>語音指令控制系統</title>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Microsoft JhengHei', 'PingFang TC', 'Noto Sans TC', sans-serif;
      background: #080d1a;
      color: #d0ddf0;
      height: 100dvh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      padding: 10px 18px 12px;
      gap: 8px;
    }

    /* ── Header ── */
    header { text-align: center; flex-shrink: 0; }
    header h1 {
      font-size: 1.35rem;
      color: #4fc3f7;
      letter-spacing: 2px;
      text-shadow: 0 0 20px rgba(79,195,247,0.4);
    }
    header p { color: #546e7a; font-size: 0.78rem; margin-top: 2px; }

    /* ── Panel base ── */
    .panel {
      background: #111a2e;
      border: 1px solid #1e2d4a;
      border-radius: 10px;
      padding: 12px 16px;
    }
    .panel-label {
      font-size: 0.68rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: #546e7a;
      margin-bottom: 8px;
    }

    /* ── Status Bar ── */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #37474f;
      flex-shrink: 0;
      transition: background 0.3s;
    }
    .dot.idle     { background: #37474f; }
    .dot.standby  { background: #26c6da; animation: blink 2s infinite; }
    .dot.listen   { background: #ef5350; animation: blink 0.9s infinite; }
    .dot.process  { background: #ffa726; animation: blink 0.45s infinite; }
    .dot.speak    { background: #42a5f5; animation: blink 0.75s infinite; }
    .dot.await    { background: #ab47bc; animation: blink 1.1s infinite; }
    .dot.execute  { background: #66bb6a; animation: blink 0.5s infinite; }
    .dot.retry    { background: #ff7043; animation: blink 0.6s infinite; }
    @keyframes blink {
      0%,100% { opacity:1; transform:scale(1); }
      50%     { opacity:.45; transform:scale(1.35); }
    }
    #status-text { font-size: 0.88rem; color: #90a4ae; }

    /* ── Main 2-col grid ── */
    .main-grid {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .col-left, .col-right {
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 0;
    }

    /* ── Transcript (fills remaining left space) ── */
    .transcript-panel {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    #transcript {
      font-size: 1.1rem;
      line-height: 1.6;
      color: #e0ecff;
      flex: 1;
      overflow-y: auto;
    }
    #transcript::-webkit-scrollbar { width: 3px; }
    #transcript::-webkit-scrollbar-thumb { background: #1e2d4a; border-radius: 2px; }
    #interim { color: #607d8b; font-style: italic; font-size: 0.9rem; margin-top: 4px; min-height: 18px; flex-shrink: 0; }

    /* ── Mic Button ── */
    .mic-section { display: flex; justify-content: center; flex-shrink: 0; }
    .mic-btn {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 3px solid #4fc3f7;
      background: #111a2e;
      color: #4fc3f7;
      cursor: pointer;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 3px;
      transition: all 0.25s;
      outline: none;
      user-select: none;
    }
    .mic-btn:hover:not(.disabled) {
      background: #182540;
      box-shadow: 0 0 24px rgba(79,195,247,0.35);
    }
    .mic-btn.recording {
      border-color: #ef5350;
      color: #ef5350;
      animation: recPulse 0.9s infinite;
    }
    .mic-btn.standby-mode {
      border-color: #26c6da;
      color: #26c6da;
      animation: standbyPulse 2s infinite;
    }
    .mic-btn.disabled {
      border-color: #263238;
      color: #37474f;
      cursor: not-allowed;
      pointer-events: none;
    }
    @keyframes recPulse {
      0%,100% { transform:scale(1); box-shadow: 0 0 14px rgba(239,83,80,.45); }
      50%     { transform:scale(1.06); box-shadow: 0 0 30px rgba(239,83,80,.75); }
    }
    @keyframes standbyPulse {
      0%,100% { transform:scale(1); box-shadow: 0 0 14px rgba(38,198,218,.3); }
      50%     { transform:scale(1.04); box-shadow: 0 0 26px rgba(38,198,218,.6); }
    }
    .mic-icon { font-size: 1.9rem; line-height: 1; }
    .mic-label { font-size: 0.58rem; letter-spacing: 1px; text-transform: uppercase; }

    /* ── Confirm Hint ── */
    .confirm-hint {
      display: none;
      text-align: center;
      padding: 8px 14px;
      background: #12102a;
      border: 1px solid #2e2a60;
      border-radius: 8px;
      color: #9c88ff;
      font-size: 0.82rem;
      flex-shrink: 0;
    }
    .confirm-hint.show { display: block; }

    /* ── Action Box ── */
    #action-text {
      font-size: 1rem;
      color: #80cbc4;
      min-height: 32px;
    }

    /* ── History (fills remaining right space) ── */
    .history-panel {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .history-list {
      flex: 1;
      overflow-y: auto;
      min-height: 0;
    }
    .history-list::-webkit-scrollbar { width: 4px; }
    .history-list::-webkit-scrollbar-track { background: #0d1525; }
    .history-list::-webkit-scrollbar-thumb { background: #1e2d4a; border-radius: 2px; }
    .hist-item {
      padding: 6px 0;
      border-bottom: 1px solid #182034;
      font-size: 0.84rem;
      color: #78909c;
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .hist-item:last-child { border-bottom: none; }
    .hist-time { color: #455a64; font-size: 0.75rem; flex-shrink: 0; }
    .hist-action { flex: 1; }
    .badge {
      font-size: 0.7rem;
      padding: 2px 8px;
      border-radius: 10px;
      flex-shrink: 0;
    }
    .badge.ok     { background: #1b3a1e; color: #81c784; }
    .badge.cancel { background: #3e1a0a; color: #ff8a65; }

    /* ── Executing Overlay (fixed, full-screen modal) ── */
    .exec-overlay {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 200;
      background: rgba(6, 10, 20, 0.92);
      backdrop-filter: blur(6px);
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      text-align: center;
      padding: 40px;
    }
    .exec-overlay.show { display: flex; }
    .exec-title {
      font-size: 2rem;
      font-weight: 700;
      color: #66bb6a;
      letter-spacing: 3px;
      text-shadow: 0 0 28px rgba(102,187,106,.6);
    }
    .exec-vehicle {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 1rem;
      white-space: pre;
      line-height: 1.2;
      letter-spacing: 0;
      padding: 14px 22px;
      border-radius: 10px;
    }
    .exec-vehicle:empty { display: none; }
    .exec-vehicle.amr {
      color: #ffffff;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.25);
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    .exec-vehicle.uav {
      color: #ffffff;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.25);
      text-shadow: 0 0 10px rgba(255,255,255,0.5);
    }
    .exec-action { font-size: 1.1rem; color: #a5d6a7; }
    .exec-api {
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 0.9rem;
      color: #e0f7fa;
      background: #0d2a2a;
      border: 1px solid #4db6ac;
      border-radius: 6px;
      padding: 5px 16px;
      letter-spacing: 0.4px;
    }
    .exec-api:empty { display: none; }
    .progress-track {
      width: min(480px, 80vw);
      height: 5px;
      background: #1b3a1b;
      border-radius: 3px;
      overflow: hidden;
      margin-top: 6px;
    }
    .progress-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #43a047, #a5d6a7);
      border-radius: 3px;
      transition: width 0.08s linear;
    }

    /* ── No-support warning ── */
    .warn {
      color: #ef9a9a;
      background: #1c0a0a;
      border: 1px solid #4e1a1a;
      border-radius: 8px;
      padding: 10px 16px;
      font-size: 0.88rem;
      display: none;
      flex-shrink: 0;
      text-align: center;
    }
    .warn.show { display: block; }
  </style>
</head>
<body>

<header>
  <h1>語音指令控制系統</h1>
  <p>按下麥克風進入待機，說 <strong>OK ITRI</strong> 啟動語音指令</p>
</header>

<div class="warn" id="warn-box"></div>

<!-- Status -->
<div class="panel status-bar">
  <div class="dot idle" id="dot"></div>
  <span id="status-text">系統未啟動</span>
</div>

<!-- Main 2-col grid -->
<div class="main-grid">

  <!-- Left: Transcript + Mic + Confirm -->
  <div class="col-left">
    <div class="panel transcript-panel">
      <div class="panel-label">語音轉文字</div>
      <div id="transcript">（尚未收到語音輸入）</div>
      <div id="interim"></div>
    </div>
    <div class="mic-section">
      <button class="mic-btn" id="mic-btn" onclick="handleMicClick()" title="按空白鍵也可啟動">
        <span class="mic-icon">🎤</span>
        <span class="mic-label" id="mic-label">點擊開始</span>
      </button>
    </div>
    <div class="confirm-hint" id="confirm-hint">
      🎙️ Say <strong>Yes</strong> to confirm or <strong>No</strong> to cancel ／ 按麥克風取消
    </div>
  </div>

  <!-- Right: Action + History -->
  <div class="col-right">
    <div class="panel">
      <div class="panel-label">識別動作</div>
      <div id="action-text">（等待指令）</div>
    </div>
    <div class="panel history-panel">
      <div class="panel-label">執行記錄</div>
      <div class="history-list" id="history-list">
        <div class="hist-item" id="hist-empty" style="color:#37474f;font-size:.82rem;">尚無記錄</div>
      </div>
    </div>
  </div>

</div>

<!-- Executing overlay (full-screen modal) -->
<div class="exec-overlay" id="exec-panel">
  <div class="exec-title">⚙ 動作執行中</div>
  <div class="exec-vehicle" id="exec-vehicle"></div>
  <div class="exec-action" id="exec-action-name"></div>
  <div class="exec-api" id="exec-api"></div>
  <div class="progress-track">
    <div class="progress-fill" id="progress-fill"></div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────────────────────────
//  Browser API
// ─────────────────────────────────────────────────────────────────
const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
const synth = window.speechSynthesis;

// ─────────────────────────────────────────────────────────────────
//  Command mapping  (keywords → action)
//  vehicle: 'AMR' for indoor, 'UAV' for outdoor
// ─────────────────────────────────────────────────────────────────
const COMMANDS = [
  {
    keywords: ['outdoor script', 'outdoor'],
    action: 'Run Outdoor Script Number 1',
    vehicle: 'UAV',
    api: 'POST /api/v1/outdoor/script/1'
  },
  {
    keywords: ['indoor script number 1', 'indoor script number one',
               'indoor 1', 'indoor one'],
    action: 'Run Indoor Script Number 1',
    vehicle: 'AMR',
    api: 'POST /api/v1/indoor/script/1'
  },
  {
    keywords: ['indoor script number 2', 'indoor script number two',
               'indoor 2', 'indoor two'],
    action: 'Run Indoor Script Number 2',
    vehicle: 'AMR',
    api: 'POST /api/v1/indoor/script/2'
  },
];

const VEHICLE_ART = {
  AMR: ` █████╗ ███╗   ███╗██████╗ \n██╔══██╗████╗ ████║██╔══██╗\n███████║██╔████╔██║██████╔╝\n██╔══██║██║╚██╔╝██║██╔══██╗\n██║  ██║██║ ╚═╝ ██║██║  ██║\n╚═╝  ╚═╝╚═╝     ╚═╝╚═╝  ╚═╝`,
  UAV: `██╗   ██╗ █████╗ ██╗   ██╗\n██║   ██║██╔══██╗██║   ██║\n██║   ██║███████║██║   ██║\n██║   ██║██╔══██║╚██╗ ██╔╝\n╚██████╔╝██║  ██║ ╚████╔╝ \n ╚═════╝ ╚═╝  ╚═╝  ╚═══╝  `,
};

const POSITIVE = ['yes', 'correct', 'right', 'confirm', 'ok', 'okay', 'affirmative', 'execute', 'go', 'do it', 'proceed', 'sure'];
const NEGATIVE = ['no', 'wrong', 'cancel', 'stop', 'incorrect', 'negative', 'abort', 'reject', "don't", 'nope'];

// ─────────────────────────────────────────────────────────────────
//  State machine
//  IDLE → (press mic) → STANDBY → (say "OK ITRI") → LISTEN_CMD
//       → PROCESS → SPEAK_ACTION → AWAIT_CONFIRM → LISTEN_CONFIRM
//       → EXECUTE → STANDBY
//       → (negative/retry) → STANDBY
//  STANDBY → (press mic) → IDLE
// ─────────────────────────────────────────────────────────────────
let state = 'IDLE';
let recognizer = null;
let pendingAction = null;
let pendingApi = null;
let pendingVehicle = null;
let progressTimer = null;

const UI = {
  dot:          document.getElementById('dot'),
  statusText:   document.getElementById('status-text'),
  transcript:   document.getElementById('transcript'),
  interim:      document.getElementById('interim'),
  micBtn:       document.getElementById('mic-btn'),
  micLabel:     document.getElementById('mic-label'),
  confirmHint:  document.getElementById('confirm-hint'),
  actionText:   document.getElementById('action-text'),
  execPanel:    document.getElementById('exec-panel'),
  execName:     document.getElementById('exec-action-name'),
  execVehicle:  document.getElementById('exec-vehicle'),
  progressFill: document.getElementById('progress-fill'),
  historyList:  document.getElementById('history-list'),
  histEmpty:    document.getElementById('hist-empty'),
  warnBox:      document.getElementById('warn-box'),
  execApi:      document.getElementById('exec-api'),
};

function setState(s) {
  state = s;
  const D = UI.dot; const B = UI.micBtn;
  D.className = 'dot'; B.className = 'mic-btn';
  UI.confirmHint.className = 'confirm-hint';

  const map = {
    IDLE:           { dotCls:'idle',    status:'系統未啟動',                  label:'點擊開始' },
    STANDBY:        { dotCls:'standby', status:'等待喚醒詞 OK ITRI…',        label:'取消',     sby:true },
    LISTEN_CMD:     { dotCls:'listen',  status:'聆聽指令中…',                 label:'取消',     rec:true },
    PROCESS:        { dotCls:'process', status:'分析指令中…',                 label:'處理中',   dis:true },
    SPEAK_ACTION:   { dotCls:'speak',   status:'播報動作中…',                 label:'播報中',   dis:true },
    AWAIT_CONFIRM:  { dotCls:'await',   status:'等待確認回覆…',               label:'取消',     confirm:true },
    LISTEN_CONFIRM: { dotCls:'listen',  status:'聆聽確認中…',                 label:'取消',     rec:true, confirm:true },
    EXECUTE:        { dotCls:'execute', status:'執行動作中…',                 label:'執行中',   dis:true },
    RETRY:          { dotCls:'retry',   status:'請重新提供指令…',             label:'請重試',   dis:true },
  };
  const cfg = map[s] || map.IDLE;
  D.classList.add(cfg.dotCls);
  UI.statusText.textContent = cfg.status;
  UI.micLabel.textContent   = cfg.label;
  if (cfg.rec)     B.classList.add('recording');
  if (cfg.dis)     B.classList.add('disabled');
  if (cfg.sby)     B.classList.add('standby-mode');
  if (cfg.confirm) UI.confirmHint.classList.add('show');
}

// ─────────────────────────────────────────────────────────────────
//  Standby: continuous listening for wake word "OK ITRI"
// ─────────────────────────────────────────────────────────────────
function startStandby() {
  if (recognizer) { try { recognizer.abort(); } catch(e){} }
  pendingAction = null;
  pendingApi = null;
  pendingVehicle = null;
  UI.transcript.textContent = '（等待喚醒詞 OK ITRI…）';
  UI.actionText.textContent = '（等待指令）';
  UI.interim.textContent = '';
  setState('STANDBY');
  startWakeWordListening();
}

function isWakeWord(text) {
  const t = text.toLowerCase();
  return (
    t.includes('itri')     ||  // direct: "ITRI"
    t.includes('itchy')    ||  // phonetic: "ITCHY"
    t.includes('i t r i')  ||  // spelled out: "I T R I"
    t.includes('i tri')    ||  // partial: "I TRI"
    t.includes('i tree')   ||  // phonetic: "I TREE"
    t.includes('itree')    ||  // run-together: "ITREE"
    /i[\s.\-]?t[\s.\-]?r[\s.\-]?i/i.test(t)  // with separators: "I.T.R.I"
  );
}

function startWakeWordListening() {
  if (!SR || state !== 'STANDBY') return;
  if (recognizer) { try { recognizer.abort(); } catch(e){} }

  recognizer = new SR();
  recognizer.lang = 'en-US';
  recognizer.continuous = true;
  recognizer.interimResults = true;
  recognizer.maxAlternatives = 3;

  recognizer.onresult = (e) => {
    if (state !== 'STANDBY') return;
    for (let i = e.resultIndex; i < e.results.length; i++) {
      // check all alternatives for better wake word coverage
      let text = '';
      for (let a = 0; a < e.results[i].length; a++) {
        if (isWakeWord(e.results[i][a].transcript)) {
          text = e.results[i][a].transcript;
          break;
        }
      }
      if (!text) text = e.results[i][0].transcript;
      UI.interim.textContent = text;
      if (isWakeWord(text)) {
        recognizer.abort();
        UI.interim.textContent = '';
        UI.transcript.textContent = 'ITRI is at your service.';
        setState('SPEAK_ACTION');
        speak('Received. Please say your command.', () => startRecognizing('cmd'));
        return;
      }
    }
  };

  recognizer.onerror = (e) => {
    UI.interim.textContent = '';
    if (e.error === 'aborted') return;
    if (state === 'STANDBY') {
      setTimeout(() => { if (state === 'STANDBY') startWakeWordListening(); }, 300);
    }
  };

  recognizer.onend = () => {
    UI.interim.textContent = '';
    if (state === 'STANDBY') {
      setTimeout(() => { if (state === 'STANDBY') startWakeWordListening(); }, 200);
    }
  };

  try { recognizer.start(); } catch(e) { console.warn('Wake word SR error:', e); }
}

// ─────────────────────────────────────────────────────────────────
//  SpeechRecognition helpers (command & confirm)
// ─────────────────────────────────────────────────────────────────
function startRecognizing(mode) {
  if (recognizer) { try { recognizer.abort(); } catch(e){} }
  if (!SR) return;

  let cmdTimer = null;
  let cmdAccum = '';

  recognizer = new SR();
  recognizer.lang = 'en-US';
  recognizer.continuous = mode === 'cmd'; // cmd: 持續聆聽避免停頓被提早送出
  recognizer.interimResults = true;
  recognizer.maxAlternatives = 3;

  recognizer.onstart = () => setState(mode === 'cmd' ? 'LISTEN_CMD' : 'LISTEN_CONFIRM');

  recognizer.onresult = (e) => {
    let interim = '', final = '';
    for (let i = e.resultIndex; i < e.results.length; i++) {
      const t = e.results[i][0].transcript;
      e.results[i].isFinal ? (final += t) : (interim += t);
    }
    UI.interim.textContent = interim;

    if (final) {
      UI.interim.textContent = '';
      if (mode === 'cmd') {
        cmdAccum += (cmdAccum ? ' ' : '') + final;
        UI.transcript.textContent = cmdAccum;
        clearTimeout(cmdTimer);
        cmdTimer = setTimeout(() => {
          if (state !== 'LISTEN_CMD') return;
          const text = cmdAccum;
          cmdAccum = '';
          recognizer.stop();
          processCommand(text);
        }, 1200);
      } else {
        handleConfirm(final);
      }
    }
  };

  recognizer.onerror = (e) => {
    UI.interim.textContent = '';
    clearTimeout(cmdTimer);
    if (e.error === 'no-speech') {
      if (mode === 'confirm') {
        setState('AWAIT_CONFIRM');
        speak('No speech detected. Please say yes or no.', () => autoListenConfirm());
      } else {
        startStandby();
      }
    } else if (e.error !== 'aborted') {
      console.warn('SR error:', e.error);
      startStandby();
    }
  };

  recognizer.onend = () => {
    UI.interim.textContent = '';
    if (mode === 'cmd' && cmdAccum && state === 'LISTEN_CMD') {
      clearTimeout(cmdTimer);
      const text = cmdAccum;
      cmdAccum = '';
      processCommand(text);
    } else if (mode === 'confirm' && state === 'LISTEN_CONFIRM') {
      // 沒有 final result 也沒有 onerror 就結束 → 自動重新聆聽
      setState('AWAIT_CONFIRM');
      autoListenConfirm();
    }
  };

  recognizer.start();
}

// ─────────────────────────────────────────────────────────────────
//  Audio feedback
// ─────────────────────────────────────────────────────────────────
function playExecSound(vehicle) {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const T = ctx.currentTime;
  const DUR = 3.6; // 配合進度條約 3.7 秒

  if (vehicle === 'AMR') {
    // 6 聲機械脈衝（方波交替音高），平均分佈整個執行期間
    [0, 0.58, 1.16, 1.74, 2.32, 2.9].forEach((start, i) => {
      const osc = ctx.createOscillator();
      const g   = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'square';
      osc.frequency.value = i % 2 === 0 ? 220 : 300;
      g.gain.setValueAtTime(0.001, T + start);
      g.gain.linearRampToValueAtTime(0.14, T + start + 0.02);
      g.gain.setValueAtTime(0.14,  T + start + 0.18);
      g.gain.exponentialRampToValueAtTime(0.001, T + start + 0.38);
      osc.start(T + start);
      osc.stop(T + start + 0.42);
    });
  } else if (vehicle === 'UAV') {
    // 旋翼加速（0→1.2s 上升）再維持懸停（輕微飄動）至結束
    const osc    = ctx.createOscillator();
    const filter = ctx.createBiquadFilter();
    const g      = ctx.createGain();
    osc.connect(filter); filter.connect(g); g.connect(ctx.destination);

    filter.type = 'lowpass';
    filter.frequency.value = 900;

    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(140, T);
    osc.frequency.exponentialRampToValueAtTime(520, T + 1.2);
    osc.frequency.setValueAtTime(505, T + 1.8);
    osc.frequency.setValueAtTime(530, T + 2.4);
    osc.frequency.setValueAtTime(510, T + 3.0);
    osc.frequency.setValueAtTime(520, T + 3.4);

    g.gain.setValueAtTime(0.001, T);
    g.gain.linearRampToValueAtTime(0.13, T + 0.5);
    g.gain.setValueAtTime(0.11, T + DUR - 0.4);
    g.gain.exponentialRampToValueAtTime(0.001, T + DUR);

    osc.start(T);
    osc.stop(T + DUR + 0.1);
  }
}

function playStartBeep() {
  const ctx = new (window.AudioContext || window.webkitAudioContext)();
  const gain = ctx.createGain();
  gain.connect(ctx.destination);

  [[600, 0, 0.08], [900, 0.1, 0.08], [1200, 0.2, 0.12]].forEach(([freq, start, dur]) => {
    const osc = ctx.createOscillator();
    osc.connect(gain);
    osc.type = 'sine';
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(0.25, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur + 0.05);
  });
}

// ─────────────────────────────────────────────────────────────────
//  Mic button handler
// ─────────────────────────────────────────────────────────────────
function handleMicClick() {
  // STANDBY → press mic → cancel standby → IDLE
  if (state === 'STANDBY') {
    recognizer && recognizer.abort();
    UI.transcript.textContent = '（尚未收到語音輸入）';
    UI.actionText.textContent = '（等待指令）';
    UI.interim.textContent = '';
    setState('IDLE');
    return;
  }
  // LISTEN_CMD → press mic → back to STANDBY
  if (state === 'LISTEN_CMD') {
    recognizer && recognizer.stop();
    startStandby();
    return;
  }
  // AWAIT_CONFIRM / LISTEN_CONFIRM → press mic → cancel action → back to STANDBY
  if (state === 'AWAIT_CONFIRM' || state === 'LISTEN_CONFIRM') {
    recognizer && recognizer.abort();
    synth.cancel();
    startStandby();
    return;
  }
  // IDLE → press mic → enter STANDBY
  if (state !== 'IDLE') return;
  playStartBeep();
  startStandby();
}

// spacebar shortcut
window.addEventListener('keydown', (e) => {
  if (e.code === 'Space' && e.target === document.body) {
    e.preventDefault();
    handleMicClick();
  }
});

// ─────────────────────────────────────────────────────────────────
//  Command → Action mapping
// ─────────────────────────────────────────────────────────────────
function processCommand(text) {
  setState('PROCESS');
  const lower = text.toLowerCase();
  setTimeout(() => {
    const matched = COMMANDS.find(c => c.keywords.some(k => lower.includes(k)));
    if (!matched) {
      UI.actionText.textContent = '（無法辨識指令）';
      setState('RETRY');
      speak('Command not recognized.', startStandby);
      return;
    }
    pendingAction = matched.action;
    pendingApi = matched.api || null;
    pendingVehicle = matched.vehicle || null;
    UI.actionText.textContent = matched.action;
    speakActionPrompt(matched.action);
  }, 400);
}

// ─────────────────────────────────────────────────────────────────
//  TTS
// ─────────────────────────────────────────────────────────────────
function speak(text, onEnd) {
  synth.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = 'en-US';
  u.rate = 0.92;
  u.pitch = 1.0;
  u.volume = 1.0;
  const voices = synth.getVoices();
  const enVoice = voices.find(v => /en[-_]US/i.test(v.lang))
                || voices.find(v => v.lang.toLowerCase().startsWith('en'));
  if (enVoice) u.voice = enVoice;
  if (onEnd) u.onend = onEnd;
  synth.speak(u);
}

function speakActionPrompt(action) {
  setState('SPEAK_ACTION');
  speak(`${action}. Please say yes or no.`, () => {
    setState('AWAIT_CONFIRM');
    autoListenConfirm();
  });
}

function autoListenConfirm() {
  setTimeout(() => {
    if (state === 'AWAIT_CONFIRM') startRecognizing('confirm');
  }, 600);
}

// ─────────────────────────────────────────────────────────────────
//  Confirmation handler
// ─────────────────────────────────────────────────────────────────
function handleConfirm(text) {
  const lower = text.toLowerCase();
  const pos = POSITIVE.some(k => lower.includes(k));
  const neg = NEGATIVE.some(k => lower.includes(k));

  if (pos && !neg) {
    executeAction();
  } else if (neg) {
    addHistory(pendingAction, false);
    setState('RETRY');
    speak('Cancelled.', startStandby);
  } else {
    setState('AWAIT_CONFIRM');
    speak('Cannot recognize. Please say yes or no.', () => autoListenConfirm());
  }
}

// ─────────────────────────────────────────────────────────────────
//  Execute
// ─────────────────────────────────────────────────────────────────
function executeAction() {
  playExecSound(pendingVehicle);
  setState('EXECUTE');
  UI.execPanel.classList.add('show');
  UI.execName.textContent   = pendingAction || '未知動作';
  UI.execApi.textContent    = pendingApi || '';
  UI.execVehicle.textContent = (pendingVehicle && VEHICLE_ART[pendingVehicle]) ? VEHICLE_ART[pendingVehicle] : '';
  UI.execVehicle.className  = 'exec-vehicle' + (pendingVehicle ? ' ' + pendingVehicle.toLowerCase() : '');
  UI.progressFill.style.width = '0%';

  let p = 0;
  clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    p += 1.5;
    UI.progressFill.style.width = Math.min(p, 100) + '%';
    if (p >= 100) {
      clearInterval(progressTimer);
      setTimeout(() => {
        addHistory(pendingAction, true);
        UI.execPanel.classList.remove('show');
        UI.progressFill.style.width = '0%';
        UI.execApi.textContent = '';
        UI.execVehicle.textContent = '';
        UI.execVehicle.className = 'exec-vehicle';
        startStandby();
      }, 600);
    }
  }, 55);
}

// ─────────────────────────────────────────────────────────────────
//  History
// ─────────────────────────────────────────────────────────────────
function addHistory(action, success) {
  const empty = document.getElementById('hist-empty');
  if (empty) empty.remove();

  const t = new Date().toLocaleTimeString('zh-TW', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
  const el = document.createElement('div');
  el.className = 'hist-item';
  el.innerHTML = `<span class="hist-time">${t}</span>`
    + `<span class="hist-action">${action || '—'}</span>`
    + `<span class="badge ${success ? 'ok' : 'cancel'}">${success ? '已執行' : '已取消'}</span>`;
  UI.historyList.insertBefore(el, UI.historyList.firstChild);
}

// ─────────────────────────────────────────────────────────────────
//  Init / Support check
// ─────────────────────────────────────────────────────────────────
window.addEventListener('load', () => {
  if (!SR) {
    UI.warnBox.textContent = '⚠️ 您的瀏覽器不支援 SpeechRecognition API，請改用 Google Chrome 或 Microsoft Edge。';
    UI.warnBox.classList.add('show');
    UI.micBtn.classList.add('disabled');
  }
  synth.getVoices();
  synth.onvoiceschanged = () => synth.getVoices();
});
</script>
